# Rendering configuration

output:
  width: 1280           # output image width in pixels
  height: 960           # output image height in pixels
  samples: 16           # Cycles render samples — 16 gives clean shadows on GPU
  engine: CYCLES        # CYCLES works headless; BLENDER_WORKBENCH/EEVEE require a display

camera:
  height_mm: 500        # camera height above table in mm
  fov_deg: 60           # field of view in degrees
  tilt_deg: 0           # 0 = straight down, >0 = slight angle

# Drop zone: sticks are dropped randomly within this rectangle (mm)
# Keep this well inside camera coverage (±289mm at 500mm height, 60° FOV).
# Sticks are 170mm long — drop within ±50mm so endpoints stay within ±135mm.
drop_zone:
  width_mm: 25
  height_mm: 25

# Table / background
table:
  color_options:        # randomly pick one per render
    - [0.1, 0.5, 0.4]  # green cloth (like real setup)
    - [0.2, 0.2, 0.6]  # blue cloth
    - [0.5, 0.5, 0.5]  # grey
    - [0.8, 0.7, 0.5]  # beige / wood
  roughness: 0.8

# Lighting: random point light above scene
lighting:
  min_energy: 2500
  max_energy: 4000
  jitter_mm: 100        # random offset from centre

# Physics simulation
physics:
  drop_height_mm: 150   # height from which sticks are dropped (must be >> stick half-length=85mm)
  drop_spread_mm: 15    # horizontal spread of drop positions
  sim_steps: 150        # frames to simulate; sticks fall ~1.5s then settle with high damping
